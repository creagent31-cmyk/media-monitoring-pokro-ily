name: Media Monitor


on:

  schedule:

    - cron: "0 */6 * * *"


  workflow_dispatch:



jobs:


  monitor:


    runs-on: ubuntu-latest


    steps:


    - uses: actions/checkout@v4


    - uses: actions/setup-python@v5

      with:

        python-version: "3.12"



    - run: |

        pip install -r requirements.txt



    - run: |

        python main.py


      env:

        OPENAI_API_KEY:
          ${{ secrets.OPENAI_API_KEY }}

        EMAIL_USER:
          ${{ secrets.EMAIL_USER }}

        EMAIL_PASSWORD:
          ${{ secrets.EMAIL_PASSWORD }}
